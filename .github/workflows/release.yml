name: Release Obsidian Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Verify Emscripten
        run: emcc -v

      - name: Update versions & Install dependencies
        run: |
          # Update the version in Obsidian plugin manifests
          cd obsidian-plugin
          sed -i 's/"version": ".*"/"version": "${{ github.event.inputs.version }}"/' manifest.json
          sed -i 's/"version": ".*"/"version": "${{ github.event.inputs.version }}"/' package.json
          
          # Install dependencies
          npm install

      - name: Build and Prepare Artifacts
        run: |
          # Fetch Lua and prepare WASM engine
          make fetch_lua_if_needed
          
          # Build the plugin
          cd obsidian-plugin
          make clean
          make
          
          # Prepare release artifacts
          cd ..
          mkdir -p release
          cp obsidian-plugin/dist/main.js release/
          cp obsidian-plugin/manifest.json release/
          cp obsidian-plugin/styles.css release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            release/main.js
            release/manifest.json
            release/styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
