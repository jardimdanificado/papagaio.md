name: Release Manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.2.0)"
        required: true
        type: string
      create_tag:
        description: "Create tag vX.Y.Z if it does not exist"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build Obsidian Plugin
  # ---------------------------------------------------------------------------
  obsidian:
    name: Build Obsidian plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install dependencies and build plugin
        run: |
          # Fetch Lua
          make fetch_lua_if_needed
          
          # Update version in manifests
          cd obsidian-plugin
          sed -i 's/"version": ".*"/"version": "${{ inputs.version }}"/' manifest.json
          sed -i 's/"version": ".*"/"version": "${{ inputs.version }}"/' package.json
          
          # Build (Makefile calls npm run build)
          npm install
          cd ..
          make obsidian

      - name: Package plugin artifact
        run: |
          mkdir -p dist/papagaio-md
          cp obsidian-plugin/dist/main.js dist/papagaio-md/
          cp obsidian-plugin/manifest.json dist/papagaio-md/
          cp obsidian-plugin/styles.css dist/papagaio-md/
          tar -czf "papagaio-v${{ inputs.version }}-obsidian.tar.gz" -C dist papagaio-md

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: papagaio-obsidian
          path: papagaio-v${{ inputs.version }}-obsidian.tar.gz

  # ---------------------------------------------------------------------------
  # Job 2: Build WASM runtime (standalone)
  # ---------------------------------------------------------------------------
  wasm:
    name: Build WASM runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build WASM module
        run: |
          make wasm

      - name: Package WASM artifact
        run: |
          mkdir -p dist_wasm
          cp obsidian-plugin/dist/papagaio.js dist_wasm/
          # In single file mode, there might not be a separate .wasm file, 
          # but we copy it if it exists.
          [ -f obsidian-plugin/dist/papagaio.wasm ] && cp obsidian-plugin/dist/papagaio.wasm dist_wasm/ || true
          tar -czf "papagaio-v${{ inputs.version }}-wasm.tar.gz" -C dist_wasm .

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: papagaio-wasm
          path: papagaio-v${{ inputs.version }}-wasm.tar.gz

  # ---------------------------------------------------------------------------
  # Job 3: Build CLI Binaries (Matrix)
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            target: linux
            archive: linux-x64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: linux-arm64
            archive: linux-arm64
          - name: macOS Intel x64
            os: macos-15-intel
            target: macos-intel
            archive: macos-x64
          - name: macOS ARM64
            os: macos-14
            target: macos-arm64
            archive: macos-arm64
          - name: Windows x64 (MinGW64)
            os: windows-latest
            target: windows-mingw
            archive: windows-x64-mingw
          - name: Linux x86 32-bit
            os: ubuntu-latest
            target: linux-x86
            archive: linux-x86
          - name: Linux ARMv7 32-bit
            os: ubuntu-latest
            target: linux-armv7
            archive: linux-armv7
          - name: Windows x86 32-bit (MinGW32)
            os: windows-latest
            target: windows-mingw32
            archive: windows-x86-mingw
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version format
        shell: bash
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version format: ${{ inputs.version }}"
            exit 1
          fi

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev pkg-config

      - name: Install cross-compile toolchain (Linux x86 32-bit)
        if: matrix.target == 'linux-x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libffi-dev:i386

      - name: Install cross-compile toolchain (Linux ARMv7)
        if: matrix.target == 'linux-armv7'
        run: |
          sudo apt-get install -y gcc-arm-linux-gnueabihf libffi-dev

      - name: Install dependencies (macOS)
        if: startsWith(matrix.target, 'macos')
        run: |
          brew update
          brew install libffi pkg-config

      - name: Setup MSYS2 (Windows MinGW)
        if: matrix.target == 'windows-mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libffi
            mingw-w64-x86_64-pkgconf

      - name: Setup MSYS2 (Windows MinGW32)
        if: matrix.target == 'windows-mingw32'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            git
            make
            mingw-w64-i686-gcc
            mingw-w64-i686-libffi
            mingw-w64-i686-pkgconf

      - name: Fetch Lua
        run: |
          make fetch_lua_if_needed

      - name: Build binary (Linux/macOS)
        if: startsWith(matrix.target, 'linux') || startsWith(matrix.target, 'macos')
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "macOS" ]; then
            export PKG_CONFIG_PATH="$(brew --prefix libffi)/lib/pkgconfig:$PKG_CONFIG_PATH"
          fi
          if [ "${{ matrix.target }}" = "linux-x86" ]; then
            export CFLAGS="-m32"
            export LDFLAGS="-m32"
          elif [ "${{ matrix.target }}" = "linux-armv7" ]; then
            export CC=arm-linux-gnueabihf-gcc
            export CROSS_COMPILE=arm-linux-gnueabihf-
          fi
          make clean
          make all -j"$(getconf _NPROCESSORS_ONLN || echo 2)"

      - name: Build binary (Windows MinGW)
        if: matrix.target == 'windows-mingw' || matrix.target == 'windows-mingw32'
        shell: msys2 {0}
        run: |
          make clean
          make all -j2

      - name: Package artifact (Linux/macOS)
        if: startsWith(matrix.target, 'linux') || startsWith(matrix.target, 'macos')
        shell: bash
        run: |
          mkdir -p dist_pkg
          # Detect binary name
          if [ -f "papagaio-md/papagaio-md" ]; then BIN="papagaio-md/papagaio-md"; else BIN="papagaio-md/papagaio-md.exe"; fi
          cp "$BIN" dist_pkg/papagaio-md
          cp README.md dist_pkg/
          [ -f CHANGELOG.md ] && cp CHANGELOG.md dist_pkg/ || true
          [ -d examples ] && cp -r examples dist_pkg/ || true
          tar -czf "papagaio-v${{ inputs.version }}-${{ matrix.archive }}.tar.gz" -C dist_pkg .

      - name: Package artifact (Windows MinGW)
        if: matrix.target == 'windows-mingw' || matrix.target == 'windows-mingw32'
        shell: msys2 {0}
        run: |
          mkdir -p dist_pkg
          cp papagaio-md/papagaio-md.exe dist_pkg/
          cp README.md dist_pkg/
          [ -f CHANGELOG.md ] && cp CHANGELOG.md dist_pkg/ || true
          [ -d examples ] && cp -r examples dist_pkg/ || true
          powershell -NoProfile -Command "Compress-Archive -Path dist_pkg\\* -DestinationPath papagaio-v${{ inputs.version }}-${{ matrix.archive }}.zip -Force"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: papagaio-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 4: Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build, wasm, obsidian]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if requested
        if: inputs.create_tag
        run: |
          tag="v${{ inputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog notes
        id: notes
        run: |
          version="${{ inputs.version }}"
          touch CHANGELOG.md
          notes="$(awk -v v="$version" '
            $0 ~ "^## " v "$" { in_section=1; next }
            in_section && $0 ~ "^## " { exit }
            in_section { print }
          ' CHANGELOG.md)"
          if [ -z "$notes" ]; then
            notes="Release v$version"
          fi
          {
            echo "body<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Clean existing release assets for tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ inputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            # Use jq to get asset names and delete them
            gh release view "$tag" --json assets --jq '.assets[].name' | while read -r asset; do
              [ -n "$asset" ] || continue
              gh release delete-asset "$tag" "$asset" -y
            done
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ inputs.prerelease }}
          files: artifacts/**/*
